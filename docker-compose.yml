version: '3.8'

services:
  postgres_db:
    image: postgres:16-alpine
    container_name: coffee_postgres_container
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: coffee_trace_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin_gui:
    image: dpage/pgadmin4
    container_name: coffee_pgadmin_container
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@coffeetrace.com
      PGADMIN_DEFAULT_PASSWORD: adminpassword
    ports:
      - "8080:80"
    depends_on:
      - postgres_db

volumes:
  postgres_data: